version: "3"
tasks:
  clean:
    cmd: cargo clean

  fmt:
    cmd: cargo fmt --all

  check:
    cmd: cargo check

  build:
    cmds:
      - soroban contract build --package pool-swap-fee
      - soroban contract optimize --wasm ../../target/wasm32v1-none/release/pool_swap_fee.wasm --wasm-out ../../target/wasm32v1-none/release/pool_swap_fee.wasm
      - cp ../../target/wasm32v1-none/release/pool_swap_fee.wasm ../../wasm/pool_swap_fee.wasm

  test:
    deps:
      - build
    cmd: cargo test

  test_slow:
    cmds:
      - task: test

  default:
    cmds:
      - task: build

  all:
    cmds:
      - task: clean
      - task: fmt
      - task: build
      - task: check
      - task: test
