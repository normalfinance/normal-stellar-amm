version: "3"
tasks:
  clean:
    cmd: cargo clean

  fmt:
    cmd: cargo fmt --all

  check:
    cmd: cargo check

  build:
    cmds:
      - soroban contract build --package lp-token
      - soroban contract optimize --wasm ../../target/wasm32v1-none/release/lp_token.wasm --wasm-out ../../target/wasm32v1-none/release/lp_token.wasm
      - ls -l ../../target/wasm32v1-none/release/*.wasm
      - cp ../../target/wasm32v1-none/release/lp_token.wasm ../../wasm/lp_token.wasm

  test:
    deps:
      - build
    cmd: cargo test

  test_slow:
    cmds:
      - task: test

  default:
    cmds:
      - task: build

  all:
    cmds:
      - task: clean
      - task: fmt
      - task: build
      - task: check
      - task: test
