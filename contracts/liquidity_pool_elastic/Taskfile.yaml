version: '3'
tasks:
  clean:
    cmd: cargo clean

  fmt:
    cmd: cargo fmt --all


  check:
    cmd: cargo check

  build:
    cmds:
      - task -d ../config_storage build || exit 1
      - task -d ../rewards_gauge build || exit 1
      - task -d ../token build || exit 1
      - task -d ../liquidity_pool_plane build || exit 1
      - soroban contract build --package liquidity-pool-elastic
      - soroban contract optimize --wasm ../target/wasm32v1-none/release/liquidity_pool_elastic.wasm --wasm-out ../contracts/liquidity_pool_elastic.wasm
      - ls -l ../contracts/*.wasm

  test:
    deps:
      - build
    cmd: cargo test

  test_slow:
    deps:
      - build
    cmd: cargo test --features=slow_tests

  default:
    cmds:
      - task: build

  all:
    cmds:
      - task: clean
      - task: fmt
      - task: build
      - task: check
      - task: test
