name: Build and Release
on:
  push:
    tags:
      - "v*" # triggered whenever a new tag (prefixed with "v") is pushed to the repository

permissions: # required permissions for the workflow
  id-token: write
  contents: write
  attestations: write

jobs:
  # Config Storage contract
  release-contract-config-storage:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/config_storage"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  # Rewards Gauge contract
  release-contract-rewards-gauge:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/rewards_gauge"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  # Token Share contract
  release-contract-lp-token:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/token_share"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  # Pool Plane contract
  release-contract-pool-plane:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/pool_plane"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
