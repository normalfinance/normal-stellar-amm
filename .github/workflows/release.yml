name: Build and Release
on:
  push:
    tags:
      - "v*" # triggered whenever a new tag (prefixed with "v") is pushed to the repository

permissions: # required permissions for the workflow
  id-token: write
  contents: write
  attestations: write

jobs:
  # Insurance Fund contract
  release-contract-insurance-fund:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/insurance_fund"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  # Oracle Registry contract
  release-contract-oracle-registry:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/oracle_registry"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  # Pool Plane contract
  release-contract-pool-plane:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/pool_plane"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  # Liquidity Calculator contract
  release-contract-liquidity_calculator:
    uses: normalfinance/soroban-build-workflow/.github/workflows/release.yml@feat/contract-dependency
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/liquidity_calculator"
      required_package: "pool_plane"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  # LP Token contract
  release-contract-lp-token:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/lp_token"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  # Pool Router contract
  release-contract-pool-router:
    uses: normalfinance/soroban-build-workflow/.github/workflows/release.yml@feat/contract-dependency
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/pool_router"
      required_package_b: "pool_plane"
      required_package: "liquidity_calculator"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  # Pool Swap Fee contract
  release-contract-pool-swap-fee:
    uses: normalfinance/soroban-build-workflow/.github/workflows/release.yml@feat/contract-dependency
    with:
      release_name: ${{ github.ref_name }}
      release_description: "Contract release"
      relative_path: "contracts/pool_swap_fee"
      required_package: "lp_token"
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
